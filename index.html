<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para começar a assistir conteúdo na Netflix">
    <meta name="theme-color" content="#000000">
    <title>Seleção de Perfil - Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" type="button" aria-label="Alternar tema">☾</button>
    </header>
    
    <main>
        <section class="profiles">
            <article class="profile">
                <a href="catalogo/catalogo.html" class="profile-link">
                    <figure>
                        <img src="assets/perfil-1.jpg" alt="Imagem de pessoa em cartoon segurando uma vela">
                        <figcaption>Gustavo</figcaption>
                    </figure>
                </a>
            </article>
            
            <article class="profile">
                <a href="catalogo/catalogo.html" class="profile-link">
                    <figure>
                        <img src="assets/perfil-2.jpg" alt="Imagem de um boné azul">
                        <figcaption>Thiago</figcaption>
                    </figure>
                </a>
            </article>

            <article class="profile">
                <a href="catalogo/catalogo.html" class="profile-link">
                    <figure>
                        <img src="assets/perfil-3.jpg" alt="Imagem de um boné azul">
                        <figcaption>Sophia</figcaption>
                    </figure>
                </a>
            </article>

             <article class="profile">
                <a href="catalogo/catalogo.html" class="profile-link">
                    <figure>
                        <img src="assets/perfil-4.jpg" alt="Imagem de um boné azul">
                        <figcaption>Pedro</figcaption>
                    </figure>
                </a>
            </article>
        </section>
    </main>

    <script>
      const themeToggle = document.getElementById('theme-toggle');
      const storedTheme = localStorage.getItem('theme');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        themeToggle.textContent = theme === 'light' ? '☾' : '☀';
        themeToggle.setAttribute('aria-label', theme === 'light' ? 'Ativar modo escuro' : 'Ativar modo claro');
      }

      function initTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = storedTheme || (prefersDark ? 'dark' : 'light');
        applyTheme(theme);
      }

      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
      });

      document.querySelectorAll('.profile-link').forEach(link => {
        link.addEventListener('click', () => {
          const name = link.querySelector('figcaption').textContent;
          const img = link.querySelector('img').src;
          localStorage.setItem('perfilAtivoNome', name);
          localStorage.setItem('perfilAtivoImagem', img);
        });
      });

      initTheme();
    </script>
</body>
</html>
