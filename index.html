<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para começar a assistir conteúdo na Netflix">
    <meta name="theme-color" content="#000000">
    <title>Seleção de Perfil - Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>
    
    <main>
        <section class="profiles">
            <article class="profile">
                <figure>
                    <img src="assets/perfil-1.jpg" alt="Imagem de pessoa em cartoon segurando uma vela">
                    <figcaption>Gustavo</figcaption>
                </figure>
            </article>
            
            <article class="profile">
                <figure>
                    <img src="assets/perfil-2.jpg" alt="Imagem de um boné azul">
                    <figcaption>Thiago</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <img src="assets/perfil-3.jpg" alt="Imagem de um boné azul">
                    <figcaption>Sophia</figcaption>
                </figure>
            </article>

             <article class="profile">
                <figure>
                    <img src="assets/perfil-4.jpg" alt="Imagem de um boné azul">
                    <figcaption>Pedro</figcaption>
                </figure>
        </section>
    </main>
</body>
</html>
